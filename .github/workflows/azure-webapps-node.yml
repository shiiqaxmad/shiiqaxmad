 const { default: makeWASocket, useMultiFileAuthState, DisconnectReason } = require("@adiwajshing/baileys");
const P = require("pino");
const fs = require("fs");
const gtts = require("gtts");

async function startBot() {
  const { state, saveCreds } = await useMultiFileAuthState("auth");

  const sock = makeWASocket({
    logger: P({ level: "silent" }),
    auth: state,
    printQRInTerminal: true
  });

  sock.ev.on("creds.update", saveCreds);

  sock.ev.on("messages.upsert", async ({ messages }) => {
    const msg = messages[0];
    if (!msg.message) return;

    const from = msg.key.remoteJid;
    const isGroup = from.endsWith("@g.us");

    const text =
      msg.message.conversation ||
      msg.message.extendedTextMessage?.text ||
      "";

    const body = text.toLowerCase();

    // 🔊 cod function
    const sendVoice = async (textMsg) => {
      const file = "./voice.mp3";
      const gTTS = new gtts(textMsg, "en");

      gTTS.save(file, async () => {
        await sock.sendMessage(from, {
          audio: fs.readFileSync(file),
          mimetype: "audio/mp4",
          ptt: true
        });
        fs.unlinkSync(file);
      });
    };

    // 🤖 yaa ku sameeyay
    if (body.includes("yaa ku sameeyay") || body.includes("yaaku sameeyay")) {
      const reply = "Waxaa i sameeyay Sheikh Axmad Al Shabaab";

      await sock.sendMessage(from, {
        text: "🤖 " + reply + " 🇸🇴"
      });

      await sendVoice(reply);
    }

    const prefix = ".";
    if (!text.startsWith(prefix)) return;

    const args = text.slice(1).trim().split(" ");
    const cmd = args.shift().toLowerCase();

    // 👑 owner
    if (cmd === "owner") {
      const reply = "Waxaa i sameeyay Sheikh Axmad Al Shabaab";

      await sock.sendMessage(from, { text: "🤖 " + reply });
      await sendVoice(reply);
    }

    // 📢 tagall
    if (cmd === "tagall" && isGroup) {
      const metadata = await sock.groupMetadata(from);
      const participants = metadata.participants;

      let teks = "📢 Dhamaan dadka group-ka:\n\n";
      let mentions = [];

      for (let p of participants) {
        teks += `@${p.id.split("@")[0]}\n`;
        mentions.push(p.id);
      }

      await sock.sendMessage(from, {
        text: teks,
        mentions: mentions
      });
    }

    // 🚫 kick
    if (cmd === "kick" && isGroup) {
      const mentioned = msg.message.extendedTextMessage?.contextInfo?.mentionedJid;
      if (!mentioned) return;

      await sock.groupParticipantsUpdate(from, mentioned, "remove");

      await sock.sendMessage(from, {
        text: "❌ Qofka waa laga saaray group-ka"
      });
    }

    // ➕ add
    if (cmd === "add" && isGroup) {
      const number = args[0];
      if (!number) return;

      const jid = number + "@s.whatsapp.net";

      await sock.groupParticipantsUpdate(from, [jid], "add");

      await sock.sendMessage(from, {
        text: "✅ Qof cusub waa lagu daray group-ka"
      });
    }

    // 🤖 AI + cod
    if (cmd === "ai") {
      const sual = args.join(" ");

      if (!sual) {
        return sock.sendMessage(from, {
          text: "❓ Su'aal ii qor"
        });
      }

      let jawaab = "Waan ku fahmay 👍";

      if (sual.includes("iska waran")) jawaab = "Waan fiicanahay adiga";
      if (sual.includes("magacaa")) jawaab = "Magaceygu waa Shiiq Axmad";
      if (sual.includes("yaa ku sameeyay")) jawaab = "Waxaa i sameeyay Sheikh Axmad Al Shabaab";

      await sock.sendMessage(from, { text: "🤖 " + jawaab });
      await sendVoice(jawaab);
    }

    // 🛑 spam control
    if (cmd === "spam") {
      const option = args[0];

      if (option === "on") {
        await sock.sendMessage(from, {
          text: "🚫 Spam waa la xakameeyay"
        });
      } else if (option === "off") {
        await sock.sendMessage(from, {
          text: "✅ Spam waa la fasaxay"
        });
      }
    }
  });

  sock.ev.on("connection.update", (update) => {
    const { connection, lastDisconnect } = update;

    if (connection === "close") {
      const shouldReconnect =
        lastDisconnect.error?.output?.statusCode !== DisconnectReason.loggedOut;

      if (shouldReconnect) {
        startBot();
      }
    } else if (connection === "open") {
      console.log("✅ Shiiq Axmad Bot waa online!");
    }
  });
}

startBot();        
